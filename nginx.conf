server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  location = /employee/index.html { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location = /employee/runtime-config.js { add_header Cache-Control "no-cache"; try_files $uri =404; }
  location /employee/assets/ { add_header Cache-Control "public, max-age=31536000, immutable"; try_files $uri =404; }
  location /employee/ { try_files $uri $uri/ /employee/index.html; }
  location /health { access_log off; return 200 "ok"; }
}
